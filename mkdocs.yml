site_name: "ai-session User Guide — LLM sessions on UChicago RCC"
site_description: "Local LLM sessions with an OpenAI-compatible gateway on UChicago RCC"
site_url: "https://rmehta1987.github.io/rcc-vllm/"

docs_dir: docs

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  font:
    text: Roboto
    code: Roboto Mono
  features:
    - content.code.copy
    - toc.integrate
    - navigation.footer
    - navigation.sections
    - search.suggest
    - search.highlight

markdown_extensions:
  - admonition
  - tables
  - attr_list
  - def_list
  - md_in_html
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true

plugins:
  - search

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Coding:
      - Coding Sessions: coding/overview.md
      - aider: coding/aider.md
      - Continue: coding/continue.md
      - opencode and Cline: coding/opencode.md
      - MCP Servers: coding/mcp.md
      - Agent responsibilities and risks: coding/agents.md
  - Billing and Service Units: billing.md
  - Model licenses: licenses.md
  - FAQ: faq.md
  - Troubleshooting: troubleshooting.md
  - Command Reference: reference.md
