# GitLab Pages is NOT enabled on this instance (no Settings > Pages), so GitLab
# cannot host a live site. Instead, this job builds the site and uploads it as a
# downloadable artifact: open the pipeline (Build > Pipelines > this job),
# download the `site` artifact, unzip it, and open index.html in a browser.
#
# This requires a CI runner with internet access. If the job stays "pending"
# forever, this project has no runner and you can delete this file; use the
# local `mkdocs serve` preview instead (see README / IMPLEMENTATION_ROADMAP.md).
build-docs:
  stage: build
  image: python:3.12-slim
  script:
    - pip install --no-cache-dir "mkdocs-material==9.7.6"
    - mkdocs build --strict --site-dir site
  artifacts:
    name: "ai-session-docs-$CI_COMMIT_SHORT_SHA"
    paths:
      - site
    expire_in: 30 days
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
